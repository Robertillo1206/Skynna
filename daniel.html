<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil - Daniel | Skynna CF</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="jugadores.css">
</head>
<body>
    <header>
        <div class="header-content">
            <a href="index.html"><img src="escudo.png" alt="Logo Skynna CF" class="main-logo"></a>
            <h1>SKYNNA CF</h1>
        </div>
    </header>

    <main class="perfil-main">
        <section class="perfil-card">
            <div class="perfil-img-container">
                <img src="Daniel.jpeg" alt="Daniel">
            </div>
            <div class="perfil-info">
                <h1>Daniel</h1>
                <p class="posicion">Delantero | Dorsal 3</p>
                <div class="descripcion-container">
                    Daniel es el motor creativo del equipo...
                </div>
            </div>
        </section>

        <h2 class="galeria-title">Galería</h2>

        <div class="carrusel-wrapper">
            <button class="nav-carrusel prev-slide" id="btnPrev">&#10094;</button>
            <div class="carrusel-track" id="track">
                <div class="carrusel-item"><img src="daniel1.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="daniel2.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="daniel3.jpeg" onclick="verGrande(this.src)"></div>
            </div>
            <button class="nav-carrusel next-slide" id="btnNext">&#10095;</button>
        </div>
    </main>

    <div id="visorModal">
        <span class="close-visor" onclick="cerrarModal()">&times;</span>
        <img id="imgGrande" src="">
    </div>

    <script src="jugadores.js"></script>
</body>
</html>
