    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="jugadores.css">
</head>

<body>

    <header>
        <div class="header-content">
            <a href="index.html">
                <img src="escudo.png" alt="Logo Skynna FC" class="main-logo">
            </a>
            <h1>SKYNNA CF</h1>
        </div>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">INICIO</a></li>

    <main class="perfil-main">

        <section class="perfil-card">
            <div class="perfil-img-container">
                <img src="Javato.jpeg" alt="Javato - Defensa Skynna FC">
            </div>
            <div class="perfil-info">
                <h1>Javato</h1>
                <p class="posicion">Defensa | Dorsal 16</p>

                <div class="descripcion-container">
                    Descripcion Javato
                </div>
            </div>
        </section>

        <h2 class="galeria-title">Galería</h2>

        <div class="carrusel-wrapper">
            <button class="nav-carrusel prev-slide" id="btnPrev">&#10094;</button>
            <div class="carrusel-track" id="track">
                <div class="carrusel-item"><img src="javato1.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato2.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato3.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato4.jpeg" onclick="verGrande(this.src)"></div>

                <div class="carrusel-item"><img src="javato6.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato7.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato8.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato9.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato10.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato11.jpeg" onclick="verGrande(this.src)"></div>
                <div class="carrusel-item"><img src="javato12.jpeg" onclick="verGrande(this.src)"></div>

            </div>
            <button class="nav-carrusel next-slide" id="btnNext">&#10095;</button>
        </div>
    </main>

    <div id="visorModal" onclick="this.style.display='none'">
        <span class="close-visor">&times;</span>
        <img id="imgGrande" src="">
    </div>

    <footer>
        <p>&copy; 2026 SKYNNA CF | Perfil de Jugador</p>
    </footer>
