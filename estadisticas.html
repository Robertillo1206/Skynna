<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estadísticas LIGA 25-26 - Skynna FC</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body {
            overflow-x: hidden;
            margin: 0;
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        .stats-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
        }

        .tabla-wrapper {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid #ddd;
            max-width: 98%;
            overflow-x: auto;
            margin-bottom: 40px;
            width: 100%;
        }

        .tabla-excel {
            border-collapse: collapse;
            font-size: 0.82rem;
            width: 100%;
        }

        .tabla-excel thead tr {
            background-color: #111;
            color: #fff;
        }

        .tabla-excel th {
            padding: 12px 8px;
            text-transform: uppercase;
            border-bottom: 3px solid #e63946;
            white-space: nowrap;
        }

        .tabla-excel td {
            padding: 10px 8px;
            text-align: center;
            border-bottom: 1px solid #eee;
            color: #333;
            white-space: nowrap;
        }

        /* Columna Fija Jugador */
        .tabla-excel td:first-child,
        .tabla-excel th:first-child {
            position: sticky;
            left: 0;
            background-color: #fff;
            z-index: 2;
            font-weight: bold;
            text-align: left;
            padding-left: 15px;
            border-right: 2px solid #eee;
        }

        .tabla-excel th:first-child {
            background-color: #111;
            z-index: 3;
        }

        .tabla-excel tbody tr:nth-child(even) {
            background-color: #fcfcfc;
        }

        /* Títulos de sección */
        .table-label {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1.1rem;
            border-left: 4px solid #e63946;
            padding-left: 10px;
        }

        .label-plantilla {
            color: #ff0000;
            border-left-color: #ff0000;
        }

        .label-invitados {
            color: #28a745;
            border-left-color: #28a745;
            margin-top: 20px;
        }

        .label-notas {
            color: #e63946;
            border-left-color: #e63946;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <header>
        <div class="header-content"><img src="escudo.png" class="main-logo">
            <h1>SKYNNA FC</h1>
        </div>
    </header>
    <nav>
        <ul>
            <li><a href="index.html">INICIO</a></li>
            <li><a href="calendario.html">CALENDARIO</a></li>
            <li><a href="plantilla.html">PLANTILLA</a></li>
            <li><a href="tercer tiempo.html">TERCER TIEMPO</a></li>
            <li><a href="estadisticas.html">ESTADÍSTICAS</a></li>
            <li><a href="clasificacion.html">CLASIFICACIÓN</a></li>
        </ul>
    </nav>

    <main>
        <div class="stats-container">
            <div class="table-label label-plantilla">Plantilla Oficial</div>
            <div id="cont-principal" class="tabla-wrapper"></div>

            <div id="tit-invitados" class="table-label label-invitados" style="display:none;">Invitados</div>
            <div id="cont-invitados" class="tabla-wrapper" style="display:none;"></div>

            <div id="tit-honorificos" class="table-label label-invitados"
                style="display:none; border-left-color: #155724;">Invitados Honoríficos</div>
            <div id="cont-honorificos" class="tabla-wrapper" style="display:none;"></div>

            <div id="tit-notas" class="table-label label-notas">Notas por Jornada</div>
            <div id="cont-notas" class="tabla-wrapper"></div>
        </div>
    </main>

    <script>
        async function cargarExcel() {
            try {
                const response = await fetch('SKYNNA FC.xlsx?t=' + new Date().getTime());
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(new Uint8Array(arrayBuffer), { type: 'array' });
                const sheet = workbook.Sheets["LIGA 25-26"];
                const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });

                // Localizar cabecera principal ("Jugador")
                let headerIdx = -1;
                for (let i = 0; i < rows.length; i++) {
                    if (rows[i].includes("Jugador")) { headerIdx = i; break; }
                }

                const headers = rows[headerIdx];
                const idxAsisPercent = headers.indexOf("% Asistencia");
                const idxNotaMedia = headers.indexOf("Nota media");

                // Definir columnas para cada tabla
                const colsStats = headers.map((h, i) => (h && !h.includes("Notas") && !h.includes("EMPTY") && h !== "Jugador2" && h !== "Nota media") ? i : -1).filter(i => i !== -1);
                const colsNotas = headers.map((h, i) => (i === 0 || h.includes("Notas") || h === "Nota media") ? i : -1).filter(i => i !== -1);

                // Columnas específicas de invitados: Jugador, Partidos, Goles, Asist, Nota media
                const colsInvitadosFormato = [0, headers.indexOf("Partidos jugados"), headers.indexOf("Goles"), headers.indexOf("Asistencias"), idxNotaMedia];

                let dataPrincipal = [];
                let dataInvitados = [];
                let dataHonorificos = [];
                let seccionActual = "PLANTILLA";

                // RECORRIDO DEL EXCEL FILA POR FILA
                for (let i = headerIdx + 1; i < rows.length; i++) {
                    const fila = rows[i];
                    const celdaNombre = fila[0] ? fila[0].toString().trim() : "";

                    // Cambios de sección detectados por nombre en columna A
                    if (celdaNombre === "Invitados") { seccionActual = "INVITADOS"; continue; }
                    if (celdaNombre === "Invitados honoríficos") { seccionActual = "HONORIFICOS"; continue; }
                    if (celdaNombre === "TOTAL" || celdaNombre === "EQUIPO" || celdaNombre === "Partidos") continue;
                    if (celdaNombre === "Pichichi" || celdaNombre.includes("Goles PP")) break;

                    if (!celdaNombre) continue;

                    // Clasificar datos
                    if (seccionActual === "PLANTILLA") dataPrincipal.push(fila);
                    else if (seccionActual === "INVITADOS") dataInvitados.push(fila);
                    else if (seccionActual === "HONORIFICOS") dataHonorificos.push(fila);
                }

                // RENDER: Plantilla Oficial
                document.getElementById('cont-principal').innerHTML = generarTablaHTML(headers, dataPrincipal, colsStats, idxAsisPercent);

                // RENDER: Invitados
                if (dataInvitados.length > 0) {
                    document.getElementById('tit-invitados').style.display = 'block';
                    document.getElementById('cont-invitados').style.display = 'block';
                    document.getElementById('cont-invitados').innerHTML = generarTablaHTML(headers, dataInvitados, colsInvitadosFormato, -1);
                }

                // RENDER: Invitados Honoríficos
                if (dataHonorificos.length > 0) {
                    document.getElementById('tit-honorificos').style.display = 'block';
                    document.getElementById('cont-honorificos').style.display = 'block';
                    document.getElementById('cont-honorificos').innerHTML = generarTablaHTML(headers, dataHonorificos, colsInvitadosFormato, -1);
                }

                // RENDER: Notas por Jornada (Combinando todos los jugadores)
                const todosLosJugadores = [...dataPrincipal, ...dataInvitados, ...dataHonorificos];
                document.getElementById('cont-notas').innerHTML = generarTablaHTML(headers, todosLosJugadores, colsNotas, -1);

            } catch (e) { console.error("Error cargando Excel:", e); }
        }

        function generarTablaHTML(headers, data, cols, idxAsis) {
            let html = '<table class="tabla-excel"><thead><tr>';
            cols.forEach(i => {
                let nombreHeader = (headers[i] || "").replace("Notas ", "");
                // Simplificar nombres de columnas para invitados
                if (nombreHeader === "Partidos jugados") nombreHeader = "Partidos";
                if (nombreHeader === "Asistencias") nombreHeader = "Asist";
                html += `<th>${nombreHeader}</th>`;
            });
            html += '</tr></thead><tbody>';
            data.forEach(fila => {
                html += '<tr>';
                cols.forEach(idx => {
                    let valor = fila[idx] || "";
                    if (idx === idxAsis && typeof valor === 'number') valor = Math.round(valor * 100) + "%";
                    else if (typeof valor === 'number' && !Number.isInteger(valor)) valor = valor.toFixed(2);
                    html += `<td>${valor}</td>`;
                });
                html += '</tr>';
            });
            return html + '</tbody></table>';
        }

        window.onload = cargarExcel;
    </script>
</body>

</html>
