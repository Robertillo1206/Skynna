<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skynna FC - Sitio Oficial</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- CABECERA PRINCIPAL -->
    <header>
        <div class="header-content">
            <img src="escudo.png" alt="Logo Skynna FC" class="main-logo">
            <h1>SKYNNA FC</h1>
        </div>
    </header>

    <!-- menu -->
    <nav>
        <ul>
            <li><a href="#proximo">INICIO</a></li>
            <!-- CAMBIO: Ahora apunta al archivo externo calendario.html -->
            <li><a href="calendario.html">CALENDARIO</a></li>
            <li><a href="plantilla.html">PLANTILLA</a></li>
            <li><a href="#galeria">GALERÍA</a></li>
        </ul>
    </nav>

    <main>
        <!-- SECCIÓN PRÓXIMO PARTIDO -->
        <section id="proximo">
            <h2 class="section-title">PRÓXIMO ENCUENTRO</h2>
            <div class="match-card">
                <p>Jornada 21</p>
                <div class="team">Skynna FC</div>
                <div class="vs">VS</div>
                <div class="team">Malamen</div>
                <div class="match-details">
                    <p>Domingo 12 de abril | 21:00h</p>
                    <p>Estadio Municipal Arroyofresno</p>
                </div>
            </div>
        </section>
        <!-- Fotos equipo - Carrusel -->
        <section id="galeria">
            <h2 class="section-title">EQUIPO</h2>
            <div class="carousel-wrapper">
                <button class="carousel-control prev" id="prevBtn">&#10094;</button>
                <div class="photo-carousel" id="carousel">
                    <div class="photo-item"><img src="Grupo.jpeg" alt="Grupo"></div>
                    <div class="photo-item"><img src="Grupo1.jpeg" alt="Grupo1"></div>
                    <div class="photo-item"><img src="Grupo2.jpeg" alt="Grupo2"></div>
                    <div class="photo-item"><img src="Grupo3.jpeg" alt="Grupo3"></div>
                    <div class="photo-item"><img src="Grupo4.jpeg" alt="Grupo4"></div>
                    <div class="photo-item"><img src="Grupo5.jpeg" alt="Grupo5"></div>
                    <div class="photo-item"><img src="Grupo6.jpeg" alt="Grupo6"></div>
                    <div class="photo-item"><img src="Grupo7.jpeg" alt="Grupo7"></div>
                    <div class="photo-item"><img src="Grupo8.jpeg" alt="Grupo8"></div>
                    <div class="photo-item"><img src="Grupo9.jpeg" alt="Grupo9"></div>
                    <div class="photo-item"><img src="Grupo10.jpeg" alt="Grupo10"></div>
                    <div class="photo-item"><img src="Grupo11.jpeg" alt="Grupo11"></div>
                    <div class="photo-item"><img src="Grupo12.jpeg" alt="Grupo12"></div>
                    <div class="photo-item"><img src="Grupo13.jpeg" alt="Grupo13"></div>
                    <div class="photo-item"><img src="Grupo14.jpeg" alt="Grupo14"></div>
                </div>
                <button class="carousel-control next" id="nextBtn">&#10095;</button>
            </div>
        </section>
    </main>

    <div id="galeria-modal" class="modal">
        <span class="close-modal">&times;</span>
        <img class="modal-content" id="img-ampliada">
    </div>

    <footer>
        <p>&copy; 2026 SKYNNA FC | Pasión por el fútbol</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
